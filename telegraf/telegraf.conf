# Telegraf configuration for Raspberry Pi connectivity monitoring
# Writes to InfluxDB 3 Core via v2 write API

# Global agent settings
[agent]
  # How often to collect metrics (seconds)
  interval = "30s"
  # Jitter to avoid thundering herd on collection
  collection_jitter = "5s"
  # How often to flush metrics to output
  flush_interval = "30s"

# Output: InfluxDB v1 write API (compatible with InfluxDB 3 Core)
[[outputs.influxdb]]
  urls = ["http://influxdb:8181"]
  database = "Diva"
  skip_database_creation = true


# Input: ping check — monitors outbound internet connectivity
[[inputs.ping]]
  # Hosts to ping — gateway checks local network, external IPs check internet
  urls = ["192.168.1.1", "8.8.8.8", "1.1.1.1"]
  # Number of pings per interval
  count = 3
  # Seconds between pings within a single collection
  ping_interval = 1.0
  # Seconds to wait for a ping response
  timeout = 2.0
  # Method: "native" uses Go ping, "exec" uses system ping binary
  method = "native"

# Input: network interface stats — bytes in/out, errors, drops
[[inputs.net]]
  # Collect stats for all interfaces; limit to specific ones if needed
  # interfaces = ["eth0", "wlan0"]

# Input: CPU usage — per-cpu and total usage percentages
[[inputs.cpu]]
  # Collect stats for all CPUs combined and individually
  percpu = true
  # Report total CPU usage across all cores
  totalcpu = true
  # Collect raw CPU time fields in addition to percentages
  collect_cpu_time = false
  # Report deltas between collections rather than totals
  report_active = false

# Input: DNS resolution time — detects DNS failures separate from connectivity loss
[[inputs.dns_query]]
  # DNS servers to query
  servers = ["8.8.8.8", "1.1.1.1"]
  # Domain to resolve
  domains = ["google.com"]
  # Query type
  record_type = "A"
  # Timeout in seconds
  timeout = 5

# Input: system uptime — useful for detecting unexpected reboots
[[inputs.system]]
  # Collects: uptime, uptime_format, load1/5/15, n_cpus, n_users
